<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width" initial-scale="1">
    <title>Nutrition Breakdown</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header><img class="logo" src="img/logo.png">
      <nav>

        <a href="index.html">Dashboard</a>
        <a href="nutrition.html" class="active">Nutrition</a>
        <a href="workout.html">Workouts</a>
        <a href="Sleep_Monitoring.html">Sleep</a>
        <a href="Goal_Management.html">Goals</a>
        <a href="dietplan.html">Diet Planning</a>
        <a href="editplan.html">Edit Planning</a>

      </nav><div class="profile">👤</div>
    </header>
    <main> 
      <div class="nutrition container">
        <div class="left">
          <h1>dish name </h1>
          <figure class="chart">
            <div class="chart__pie"></div>
            <figcaption class="chart__legends">
              <div class="chart__legends__color--carbs"></div><span>Crabs: xx% </span>
              <div class="chart__legends__color--fat"></div><span>Fat: xx%</span>
              <div class="chart__legends__color--protein"></div><span>Protein: xx%</span>
            </figcaption>
          </figure>
        </div>
        <div class="right">
          <div class="list">
            <div class="list__header"> 
              <h2 class="list__header__title">Ingredients</h2>
              <button class="list__header__btn">-</button>
            </div>
            <div class="list__content"> 
              <p>place holder</p>
            </div>
            <div class="list__header"> 
              <h2 class="list__header__title">Recepy</h2>
              <button class="list__header__btn">+</button>
            </div>
            <div class="list__content"> 
              <p>place holder</p>
            </div>
            <div class="list__header"> 
              <h2 class="list__header__title">Other dishes</h2>
              <button class="list__header__btn">+</button>
            </div>
            <div class="list__content"> 
              <p>place holder</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
