<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body">
    <main class="background">
        <section class="wrapper">
            <div class="wrapper__top">
                <img src="" alt="" class="wrapper__top_logo">
                <h1 class="wrapper__top_title">Sign Up</h1>
                <span class="wrapper__top_subtitle">Create account to get starded</span>
            </div>
            <form action="" class="wrapper__form">
                <lable class="wrapper__form_lbl">Full name</lable>
                <input type="text" class="wrapper__form_input">
                <lable class="wrapper__form_lbl">Email</lable>
                <input type="text" class="wrapper__form_input">
                <lable class="wrapper__form_lbl">Password</lable>
                <input type="text" class="wrapper__form_input">
                <lable class="wrapper__form_lbl">Confirm password</lable>
                <input type="text" class="wrapper__form_input">
                <button class="wrapper__form_btn">Create account</button>
            </form>
            <div class="wrapper__switch">
                <span class="wrapper__switch_span">Already have an account?</span>
                <a href="login.html" class="wrapper__switch_login"></a>
            </div>
        </section>
    </main>
</body>
</html>
