<!DOCTYPE html>
<html>
<head>
    <title>Setup Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <img src="img/logo.png" class="logo">

    <div class="profile">👤</div>
</header>

<div class="container">

<main>

    <div class="form-container">

        <div class="form-card">

            <h1 class="form-h1">Set Up Your Profile</h1>

            <label class="form-label">Name</label>
            <input type="text" class="form-input" placeholder="Enter your name">

            <label class="form-label">Age</label>
            <input type="number" class="form-input" placeholder="Enter your age">

            <label class="form-label">Gender</label>
            <select class="form-select">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label class="form-label">Weight (kg)</label>
            <input type="number" class="form-input" placeholder="e.g. 70">

            <label class="form-label">Height (cm)</label>
            <input type="number" class="form-input" placeholder="e.g. 175">

            <label class="form-label">Fitness Goal</label>
            <select class="form-select">
                <option>Lose weight</option>
                <option>Build muscle</option>
                <option>Maintain</option>
            </select>

            <label class="form-label">Activity Level</label>
            <select class="form-select">
                <option>Low</option>
                <option>Moderate</option>
                <option>High</option>
            </select>

            <label class="form-label">Target Weight (kg)</label>
            <input type="number" class="form-input" placeholder="e.g. 65">

            <label class="form-label">Preferred Workout Type</label>
            <select class="form-select">
                <option>Gym</option>
                <option>Home</option>
                <option>Cardio</option>
                <option>Mixed</option>
            </select>

            <label class="form-label">Dietary Preference</label>
            <select class="form-select">
                <option>None</option>
                <option>Vegetarian</option>
                <option>Vegan</option>
                <option>High Protein</option>
            </select>

            <a href="index.html" class="form-btn" style="display:block; text-align:center; text-decoration: none;">
                Save & Continue
            </a>

        </div>

    </div>

</main>

<footer>
    <div>A Track © 2026</div>

    <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>
</footer>

</div>

</body>
</html>
