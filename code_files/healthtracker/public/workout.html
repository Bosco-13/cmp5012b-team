<!DOCTYPE html>
<html>
<head>
    <title>Workouts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="img/logo.png" class="logo">
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="dietplan.html">Diet Planning</a>
            <a href="workout.html">Workouts</a>
            <a href="Sleep_Monitoring.html">Sleep</a>
            <a href="Goal_Management.html">Goals</a>
            <a href="editplan.html">Edit Planning</a>
            <a href="form.html">Form (Testing)</a>
        </nav>
        <div class="profile">👤</div>
    </header>
    <main class="main">
        <section class="one">
            <div class="container">
                <h1 class="title">Workouts</h1>
                <div class="cards">
                    <div class="cards__card">
                        <h3 class="cards__card_title">This Week</h3>
                        <p class="cards__card_text"><b>4</b></p>
                        <span class="cards__card_unit">workouts</span>
                    </div>
                    <div class="cards__card">
                        <h3 class="cards__card_title">Calories Burned</h3>
                        <p class="cards__card_text"><b> 2840</b></p>
                        <span class="cards__card_unit">kcal</span>
                    </div>
                    <div class="cards__card">
                        <h3 class="cards__card_title">Total time spent</h3>
                        <p class="cards__card_text"><b>8</b></p>
                        <span class="cards__card_unit">hours</span>
                    </div>
                    <div class="cards__card">
                        <h3 class="cards__card_title">Streak</h3>
                        <p class="cards__card_text"><b>11</b></p>
                        <span class="cards__card_unit">days in row</span>
                    </div>
                </div>
            </div>
        </section>
        <section class="graph">
            <h3>Weekly Workout Progress</h3>
            <p>(Last 7 days)</p>
        </section>
        <section class="workout-list">
            <h3>Recent Workouts</h3>
            <div class="workout-item">Push Day</div>
            <div class="workout-item">Pull Day</div>
            <div class="workout-item">Cardio</div>
        </section>
        <!-- <section class="actions">
            <button class="primary">Add Workout</button>
        </section> -->
    </main>
    <footer>A Track © 2026</footer>
</body>
<script src="js/common.js"></script>
</html>
