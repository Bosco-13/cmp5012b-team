<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="body">
    <div class="background">
      <div class="wrapper">
        <div class="wrapper__top">
          <img
            src="img/logo.png"
            alt="Health Tracker logo"
            class="wrapper__top_logo"
          />
          <h1 class="wrapper__top_title">Enter your email</h1>
        </div>

        <form id="loginForm" class="wrapper__form">
          <label class="wrapper__form_lbl" for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="example@example.com"
            required
            class="wrapper__form_input"
          />
          <button class="wrapper__form_btn" type="submit">Send link</button>
        </form>

        <p class="box__text" id="message"></p>

        <p class="wrapper__switch">
          Do not have an account?
          <a class="wrapper__switch_login" href="signup.html">Create one</a>
        </p>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
