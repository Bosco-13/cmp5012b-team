<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body class="body">
    <main class="background">
        <div class="wrapper">
            <div class="wrapper__top">
                <img src="img/logo.png" alt="" class="wrapper__top_logo">
                <h1 class="wrapper__top_title">Enter your email</h1>
            </div>
            <form action="" class="wrapper__form" id="signupForm">
                <input type="password" class="wrapper__form_input" placeholder="New password" >
                <input type="password" class="wrapper__form_input" placeholder="Confirm password" >
                
                <button type="submit" class="wrapper__form_btn">Confirm</button>
            </form>
            <p id="message"></p>
            <div class="wrapper__switch">
                <span class="wrapper__switch_span">Go back to </span>

                <a href="login.html" class="wrapper__switch_login"><b>Log in</b></a>

            </div>
        </div>
    </main>
    <script src="js/common.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
