<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="body">
    <div class="background">
      <div class="wrapper">
        <div class="wrapper__top">
          <img
            src="img/logo.png"
            alt="Health Tracker logo"
            class="wrapper__top_logo"
          />
          <h1 class="wrapper__top_title">Change password</h1>
        </div>

        <form id="loginForm" class="wrapper__form">
            <input type="hidden" name="token" id="token">
            <label class="wrapper__form_lbl" for="password">
                New Password
            </label>
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Enter new password"
                required
                class="wrapper__form_input"
            />
            <label class="wrapper__form_lbl" for="confirmPassword">
                Confirm Password
            </label>
            <input
                type="password"
                name="confirmPassword"
                id="confirmPassword"
                placeholder="Confirm new password"
                required
                class="wrapper__form_input"
            />

         
            <button class="wrapper__form_btn" type="submit">Login</button>
        </form>

        <p class="box__text" id="message"></p>

        <p class="wrapper__switch">
          Do not have an account?
          <a class="wrapper__switch_login" href="signup.html">Create one</a>
        </p>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
